<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Agents — Skill Catalog</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242736;
    --surface3: #2e3245;
    --border: #343848;
    --text: #e2e4f0;
    --text-muted: #8b90a8;
    --text-dim: #5a5f78;
    --accent: #6c72f7;
    --accent-glow: rgba(108,114,247,0.15);
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --purple: #a855f7;
    --cyan: #06b6d4;
    --pink: #ec4899;
    --low-bg: rgba(34,197,94,0.12);
    --low-text: #4ade80;
    --med-bg: rgba(234,179,8,0.12);
    --med-text: #fbbf24;
    --high-bg: rgba(239,68,68,0.12);
    --high-text: #f87171;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-logo {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-logo span { color: var(--accent); }
  .header-meta {
    color: var(--text-muted);
    font-size: 0.8rem;
    margin-left: auto;
  }

  /* ── LAYOUT ── */
  .page { max-width: 1400px; margin: 0 auto; padding: 24px; }

  /* ── DASHBOARD ── */
  .dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-card.accent { border-color: var(--accent); background: var(--accent-glow); }
  .stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--text); }
  .stat-sub { font-size: 0.78rem; color: var(--text-muted); }

  /* ── RISK DISTRIBUTION BAR ── */
  .risk-bar-wrap { grid-column: span 2; min-width: 0; }
  .risk-bar-track {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    gap: 2px;
    margin: 10px 0 8px;
  }
  .risk-bar-seg { height: 100%; border-radius: 2px; }
  .risk-bar-labels { display: flex; gap: 16px; }
  .risk-bar-label { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .risk-bar-label::before { content: ''; width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .risk-bar-label.low::before { background: var(--green); }
  .risk-bar-label.med::before { background: var(--yellow); }
  .risk-bar-label.high::before { background: var(--red); }

  /* ── TOP SKILLS PANEL ── */
  .top-skills-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    grid-column: span 3;
    min-width: 0;
  }
  .top-skills-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .top-skill-chip {
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    color: var(--text);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box::placeholder { color: var(--text-dim); }
  .search-box:focus { border-color: var(--accent); }
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: var(--accent); }
  .control-button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  .control-button:hover { border-color: var(--accent); color: var(--accent); }
  .catalog-source {
    color: var(--text-muted);
    font-size: 0.78rem;
    white-space: nowrap;
  }
  .results-count { color: var(--text-muted); font-size: 0.82rem; margin-left: auto; }

  /* ── GRID ── */
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  /* ── SKILL CARD ── */
  .skill-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.15s;
  }
  .skill-card:hover { border-color: #4a4f6a; transform: translateY(-1px); }
  .skill-card.hidden { display: none; }

  .card-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .card-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .card-title-group { flex: 1; min-width: 0; }
  .card-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-category { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }
  .risk-badge {
    flex-shrink: 0;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-name-link {
    color: inherit;
    text-decoration: none;
  }
  .card-name-link:hover {
    color: var(--accent);
  }
  .risk-low { background: var(--low-bg); color: var(--low-text); }
  .risk-medium { background: var(--med-bg); color: var(--med-text); }
  .risk-high { background: var(--high-bg); color: var(--high-text); }

  /* ── SCORES ROW ── */
  .scores-row {
    padding: 12px 18px;
    display: flex;
    gap: 20px;
    border-bottom: 1px solid var(--border);
  }
  .score-item { display: flex; flex-direction: column; gap: 4px; }
  .score-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .score-stars { display: flex; gap: 2px; }
  .star { width: 12px; height: 12px; border-radius: 2px; }
  .star.filled { background: var(--accent); }
  .star.empty { background: var(--surface3); }
  .score-num { font-size: 0.78rem; color: var(--text-muted); margin-top: 1px; }

  /* ── TAGS ROW ── */
  .tags-row {
    padding: 10px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid var(--border);
  }
  .tag {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-weight: 500;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .tag.has { background: rgba(108,114,247,0.08); color: var(--accent); border-color: rgba(108,114,247,0.25); }
  .tag.lang-python { background: rgba(234,179,8,0.08); color: #fbbf24; border-color: rgba(234,179,8,0.2); }
  .tag.lang-javascript { background: rgba(234,179,8,0.08); color: #fbbf24; border-color: rgba(234,179,8,0.2); }
  .tag.ext { background: rgba(249,115,22,0.08); color: #fb923c; border-color: rgba(249,115,22,0.2); }
  .tag.lic { background: rgba(34,197,94,0.08); color: #4ade80; border-color: rgba(34,197,94,0.2); }

  /* ── CAPABILITIES ── */
  .capabilities {
    padding: 12px 18px;
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }

  /* ── ACCORDION ── */
  .accordion { border-top: 1px solid var(--border); }
  .accordion-item { border-bottom: 1px solid var(--border); }
  .accordion-item:last-child { border-bottom: none; }
  .accordion-trigger {
    width: 100%;
    background: none;
    border: none;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.78rem;
    font-weight: 500;
    text-align: left;
    transition: color 0.15s, background 0.15s;
  }
  .accordion-trigger:hover { color: var(--text); background: rgba(255,255,255,0.02); }
  .accordion-trigger .chevron {
    transition: transform 0.2s;
    font-size: 0.7rem;
    opacity: 0.5;
  }
  .accordion-trigger[aria-expanded="true"] .chevron { transform: rotate(180deg); opacity: 1; }
  .accordion-trigger[aria-expanded="true"] { color: var(--text); }
  .accordion-body {
    display: none;
    padding: 4px 18px 14px;
    font-size: 0.8rem;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .accordion-body.open { display: block; }

  /* ── CHECKLIST ── */
  .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; margin-top: 8px; }
  .check-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
  .check-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.pass { background: var(--green); }
  .dot.fail { background: var(--surface3); border: 1px solid var(--border); }

  /* ── RATIONALE TEXT ── */
  .rationale { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
  .findings-list { list-style: none; margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .findings-list li {
    padding: 4px 8px;
    background: var(--high-bg);
    color: var(--high-text);
    font-size: 0.75rem;
    border-radius: 4px;
  }
  .findings-list li::before { content: '⚠ '; }
  .ext-list { list-style: none; margin-top: 6px; display: flex; flex-direction: column; gap: 3px; }
  .ext-list li { font-size: 0.78rem; padding: 3px 0; color: var(--text-muted); }
  .ext-list li::before { content: '▸ '; color: var(--accent); }
  .detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; margin-top: 6px; }
  .detail-key { font-size: 0.72rem; color: var(--text-dim); text-align: right; }
  .detail-val { font-size: 0.75rem; color: var(--text-muted); }

  /* ── LICENSE ── */
  .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 4px; }

  /* ── NO RESULTS ── */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text-muted); display: none; }
  .no-results.visible { display: block; }

  /* ── FOOTER ── */
  .page-footer { text-align: center; padding: 32px 0 24px; color: var(--text-dim); font-size: 0.78rem; }

  /* ── LIGHT MODE ── */
  .light {
    --bg: #f4f5f9;
    --surface: #ffffff;
    --surface2: #edf0f7;
    --surface3: #dde1ed;
    --border: #d0d5e8;
    --text: #1a1d2e;
    --text-muted: #5a6080;
    --text-dim: #9299b8;
    --accent: #4f56e8;
    --accent-glow: rgba(79,86,232,0.1);
    --low-bg: rgba(22,163,74,0.1);
    --low-text: #16a34a;
    --med-bg: rgba(202,138,4,0.1);
    --med-text: #b45309;
    --high-bg: rgba(220,38,38,0.1);
    --high-text: #dc2626;
  }
  .light .site-header {
    background: linear-gradient(135deg, #ffffff 0%, #f4f5f9 100%);
  }
  .light .skill-card:hover { border-color: #b0b8d8; }
  .light .accordion-trigger:hover { background: rgba(0,0,0,0.03); }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--accent); }
  .theme-toggle .theme-icon { font-size: 0.95rem; }

  @media (max-width: 600px) {
    .skills-grid { grid-template-columns: 1fr; }
    .risk-bar-wrap { grid-column: span 1; }
    .top-skills-panel { grid-column: span 1; }
    .checklist { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="header-logo">forge<span>agents</span> / skills</div>
    <div class="header-meta" id="headerMeta"></div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle light/dark mode">
      <span class="theme-icon" id="themeIcon">🌙</span>
      <span id="themeLabel">Light mode</span>
    </button>
  </div>
</header>

<main class="page">
  <div class="dashboard" id="dashboard"></div>

  <div class="controls">
    <input class="search-box" type="search" id="searchBox" placeholder="Search skills by name, capability, or keyword…" />
    <select class="filter-select" id="riskFilter">
      <option value="">All Risk Levels</option>
      <option value="low">Low Risk</option>
      <option value="medium">Medium Risk</option>
      <option value="high">High Risk</option>
    </select>
    <select class="filter-select" id="categoryFilter">
      <option value="">All Categories</option>
    </select>
    <select class="filter-select" id="sortBy">
      <option value="name">Sort: Name</option>
      <option value="usage">Sort: Usage Value</option>
      <option value="bp">Sort: Best Practices</option>
      <option value="tokens">Sort: Token Size</option>
    </select>
    <button class="control-button" id="openCatalogButton" type="button">Open Catalog</button>
    <input id="catalogPicker" type="file" accept=".json,application/json" hidden />
    <span class="catalog-source" id="catalogSource">Source: skill-catalog.json</span>
    <span class="results-count" id="resultsCount"></span>
  </div>

  <div class="skills-grid" id="skillsGrid"></div>
  <div class="no-results" id="noResults">No skills match your filters.</div>
</main>

<footer class="page-footer" id="pageFooter"></footer>

<script>
let CATALOG;
let controlsBound = false;

// ── CATEGORY MAP ──
function getCategory(name) {
  if (name.startsWith('marketing-') || name.startsWith('marketing')) return 'Marketing';
  if (name.startsWith('tech-')) return 'Technical';
  if (name.startsWith('adsense')) return 'AdSense';
  if (name.startsWith('agent-')) return 'Agent';
  if (name.startsWith('skill-')) return 'Meta / Skills';
  if (name.startsWith('mcp-')) return 'MCP / Infra';
  if (name.startsWith('business') || name === 'startup-strategic-planning' || name === 'strategy-research-analyst') return 'Business';
  if (name.startsWith('product-') || name === 'mckinsey-problem-solving-brief') return 'Product';
  if (name.startsWith('ux-')) return 'UX / Design';
  if (name === 'brainstorming' || name === 'doc-coauthoring' || name === 'humanizer') return 'Productivity';
  if (name === 'change-management' || name === 'customer-segmentation' || name === 'sop-creator') return 'Operations';
  if (name === 'nudge-unit' || name === 'startup-strategic-planning') return 'Strategy';
  if (name === 'plugin-builder') return 'Technical';
  if (name === 'brand-strategist' || name.startsWith('forge-brand')) return 'Brand';
  return 'Other';
}

// ── CATEGORY ICON + COLOR ──
const CATEGORY_STYLES = {
  'Marketing': { icon: '📣', bg: '#1e1230', color: '#c084fc' },
  'Technical': { icon: '⚙️', bg: '#0f1f30', color: '#38bdf8' },
  'AdSense': { icon: '💰', bg: '#1a1a10', color: '#facc15' },
  'Agent': { icon: '🤖', bg: '#10201a', color: '#34d399' },
  'Meta / Skills': { icon: '🛠️', bg: '#1a1020', color: '#a78bfa' },
  'MCP / Infra': { icon: '🔌', bg: '#101a20', color: '#22d3ee' },
  'Business': { icon: '📊', bg: '#1a1410', color: '#fb923c' },
  'Product': { icon: '🎯', bg: '#121a1a', color: '#2dd4bf' },
  'UX / Design': { icon: '🎨', bg: '#1a1020', color: '#e879f9' },
  'Productivity': { icon: '⚡', bg: '#101a14', color: '#4ade80' },
  'Operations': { icon: '📋', bg: '#1a1410', color: '#fdba74' },
  'Strategy': { icon: '🧠', bg: '#101520', color: '#818cf8' },
  'Brand': { icon: '✨', bg: '#1a1020', color: '#f0abfc' },
  'Other': { icon: '◦', bg: '#1a1a1a', color: '#94a3b8' }
};

function stars(score, max=5) {
  let html = '<div class="score-stars">';
  for (let i=1; i<=max; i++) html += `<div class="star ${i<=score?'filled':'empty'}"></div>`;
  html += '</div>';
  return html;
}

function riskBadge(rating) {
  const map = { low: 'risk-low', medium: 'risk-medium', high: 'risk-high' };
  const label = { low: 'Low Risk', medium: 'Med Risk', high: 'High Risk' };
  return `<span class="risk-badge ${map[rating]||'risk-low'}">${label[rating]||rating}</span>`;
}

function checklistHtml(cl) {
  const labels = {
    valid_frontmatter: 'Valid Frontmatter',
    description_quality: 'Description Quality',
    metadata_block: 'Metadata Block',
    triggers_field: 'Triggers Field',
    role_definition: 'Role Definition',
    structured_workflow: 'Structured Workflow',
    constraints_section: 'Constraints Section',
    reference_usage: 'Reference Usage',
    concise_instructions: 'Concise Instructions',
    knowledge_reference: 'Knowledge Reference'
  };
  return '<div class="checklist">' +
    Object.entries(cl).map(([k,v]) =>
      `<div class="check-item"><div class="dot ${v?'pass':'fail'}"></div><span>${labels[k]||k}</span></div>`
    ).join('') + '</div>';
}

function buildCard(skill) {
  const ev = skill.evaluation;
  const cat = getCategory(skill.name);
  const style = CATEGORY_STYLES[cat] || CATEGORY_STYLES['Other'];
  const st = skill.structure;
  const nameHtml = skill.url
    ? `<a href="${skill.url}" class="card-name-link" target="_blank" rel="noopener noreferrer" title="Open ${skill.name} in repository">${skill.name}</a>`
    : skill.name;

  // Tags
  const tags = [];
  if (st.has_scripts && ev.script_languages && ev.script_languages[0] !== 'none') {
    ev.script_languages.forEach(l => { if (l !== 'none') tags.push(`<span class="tag lang-${l}">${l} script</span>`); });
  }
  if (st.has_references) tags.push('<span class="tag has">references</span>');
  if (st.has_agents) tags.push('<span class="tag has">sub-agents</span>');
  if (ev.external_requirements_indicator !== 'self-contained') tags.push('<span class="tag ext">external deps</span>');
  if (ev.license && ev.license !== 'unspecified') tags.push(`<span class="tag lic">${ev.license}</span>`);
  if (st.estimated_tokens) tags.push(`<span class="tag">${st.estimated_tokens} tokens</span>`);

  // Security findings
  let findingsHtml = '';
  if (ev.security_risk && ev.security_risk.findings && ev.security_risk.findings.length > 0) {
    findingsHtml = '<ul class="findings-list">' + ev.security_risk.findings.map(f => `<li>${f}</li>`).join('') + '</ul>';
  }

  // External requirements
  let extHtml = '';
  if (ev.external_requirements && !(ev.external_requirements.length === 1 && ev.external_requirements[0] === 'none')) {
    extHtml = '<ul class="ext-list">' + ev.external_requirements.map(r => `<li>${r}</li>`).join('') + '</ul>';
  } else {
    extHtml = '<p style="font-size:0.8rem;color:var(--text-dim);margin-top:4px">Self-contained — no external dependencies</p>';
  }

  // Checklist
  const clHtml = ev.best_practices && ev.best_practices.checklist ? checklistHtml(ev.best_practices.checklist) : '';

  const uniqueId = skill.name.replace(/[^a-z0-9]/g, '-');

  return `
<div class="skill-card" data-name="${skill.name}" data-cat="${cat}" data-risk="${ev.security_risk?.rating||'low'}" data-usage="${ev.usage_value?.score||0}" data-bp="${ev.best_practices?.score||0}" data-tokens="${st.estimated_tokens||0}">
  <div class="card-header">
    <div class="card-icon" style="background:${style.bg};color:${style.color}">${style.icon}</div>
    <div class="card-title-group">
      <div class="card-name" title="${skill.name}">${nameHtml}</div>
      <div class="card-category">${cat}</div>
    </div>
    ${riskBadge(ev.security_risk?.rating||'low')}
  </div>

  <div class="capabilities">${ev.core_capabilities||''}</div>

  <div class="scores-row">
    <div class="score-item">
      <div class="score-label">Usage Value</div>
      ${stars(ev.usage_value?.score||0)}
      <div class="score-num">${ev.usage_value?.score||0} / 5</div>
    </div>
    <div class="score-item">
      <div class="score-label">Best Practices</div>
      ${stars(ev.best_practices?.score||0)}
      <div class="score-num">${ev.best_practices?.score||0} / 5</div>
    </div>
    <div class="score-item" style="margin-left:auto">
      <div class="score-label">File Count</div>
      <div style="font-size:1.4rem;font-weight:700;line-height:1;color:var(--text)">${st.file_count||1}</div>
      <div class="score-num">files</div>
    </div>
  </div>

  <div class="tags-row">${tags.join('')}</div>

  <div class="accordion">

    <div class="accordion-item">
      <button class="accordion-trigger" aria-expanded="false" onclick="toggleAccordion(this, '${uniqueId}-rationale')">
        Evaluation Rationale <span class="chevron">▼</span>
      </button>
      <div class="accordion-body" id="${uniqueId}-rationale">
        <p class="section-title">Usage Value</p>
        <p class="rationale">${ev.usage_value?.rationale||''}</p>
        <p class="section-title" style="margin-top:10px">Best Practices</p>
        <p class="rationale">${ev.best_practices?.rationale||''}</p>
        <p class="section-title" style="margin-top:10px">Security</p>
        <p class="rationale">${ev.security_risk?.rationale||''}</p>
        ${findingsHtml}
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-trigger" aria-expanded="false" onclick="toggleAccordion(this, '${uniqueId}-checklist')">
        Best Practices Checklist <span class="chevron">▼</span>
      </button>
      <div class="accordion-body" id="${uniqueId}-checklist">
        ${clHtml || '<p style="color:var(--text-dim);font-size:0.78rem">No checklist data available.</p>'}
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-trigger" aria-expanded="false" onclick="toggleAccordion(this, '${uniqueId}-deps')">
        External Requirements <span class="chevron">▼</span>
      </button>
      <div class="accordion-body" id="${uniqueId}-deps">
        ${extHtml}
      </div>
    </div>

    <div class="accordion-item">
      <button class="accordion-trigger" aria-expanded="false" onclick="toggleAccordion(this, '${uniqueId}-meta')">
        Structure &amp; Metadata <span class="chevron">▼</span>
      </button>
      <div class="accordion-body" id="${uniqueId}-meta">
        <div class="detail-grid">
          <span class="detail-key">Path</span><span class="detail-val">${skill.path}</span>
          <span class="detail-key">Tokens</span><span class="detail-val">${st.estimated_tokens}</span>
          <span class="detail-key">Files</span><span class="detail-val">${st.file_count}</span>
          <span class="detail-key">Scripts</span><span class="detail-val">${st.has_scripts ? (ev.script_languages?.filter(l=>l!=='none').join(', ')||'yes') : 'none'}</span>
          <span class="detail-key">References</span><span class="detail-val">${st.has_references ? 'yes' : 'no'}</span>
          <span class="detail-key">Sub-Agents</span><span class="detail-val">${st.has_agents ? 'yes' : 'no'}</span>
          <span class="detail-key">License</span><span class="detail-val">${ev.license||'unspecified'}</span>
          <span class="detail-key">Source</span><span class="detail-val"><a href="${skill.url}" style="color:var(--accent);text-decoration:none" target="_blank">view on GitHub ↗</a></span>
        </div>
      </div>
    </div>

  </div>
</div>`;
}

function toggleAccordion(btn, id) {
  const body = document.getElementById(id);
  const isOpen = btn.getAttribute('aria-expanded') === 'true';
  btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
  body.classList.toggle('open', !isOpen);
}

// ── DASHBOARD ──
function buildDashboard() {
  const s = CATALOG.summary;
  const riskDist = s.security_risk_distribution;
  const total = s.total_skills;
  const lowPct = (riskDist.low / total * 100).toFixed(0);
  const medPct = (riskDist.medium / total * 100).toFixed(0);
  const highPct = (riskDist.high / total * 100).toFixed(0);

  const topUsage = CATALOG.skills.filter(s => s.evaluation.usage_value?.score === 5).map(s => s.name);
  const topBP = [...CATALOG.skills].sort((a,b) => (b.evaluation.best_practices?.score||0)-(a.evaluation.best_practices?.score||0)).slice(0,5);

  document.getElementById('dashboard').innerHTML = `
    <div class="stat-card accent">
      <div class="stat-label">Total Skills</div>
      <div class="stat-value">${s.total_skills}</div>
      <div class="stat-sub">Fully evaluated</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Usage Value</div>
      <div class="stat-value">${s.avg_usage_value}</div>
      <div class="stat-sub">out of 5</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Best Practices</div>
      <div class="stat-value">${s.avg_best_practices}</div>
      <div class="stat-sub">out of 5</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Zero High Risk</div>
      <div class="stat-value" style="color:var(--green)">${riskDist.high}</div>
      <div class="stat-sub">high-risk skills</div>
    </div>
    <div class="stat-card risk-bar-wrap">
      <div class="stat-label">Security Risk Distribution</div>
      <div class="risk-bar-track">
        <div class="risk-bar-seg" style="width:${lowPct}%;background:var(--green)"></div>
        <div class="risk-bar-seg" style="width:${medPct}%;background:var(--yellow)"></div>
        <div class="risk-bar-seg" style="width:${highPct}%;background:var(--red)"></div>
      </div>
      <div class="risk-bar-labels">
        <span class="risk-bar-label low">Low (${riskDist.low})</span>
        <span class="risk-bar-label med">Medium (${riskDist.medium})</span>
        <span class="risk-bar-label high">High (${riskDist.high})</span>
      </div>
    </div>
    <div class="stat-card top-skills-panel">
      <div class="stat-label">Top-Rated Skills (Usage Value = 5)</div>
      <div class="top-skills-list">
        ${topUsage.map(n => `<span class="top-skill-chip">${n}</span>`).join('')}
      </div>
    </div>
  `;
}

// ── POPULATE CATEGORY FILTER ──
function buildCategoryFilter() {
  const cats = [...new Set(CATALOG.skills.map(s => getCategory(s.name)))].sort();
  const sel = document.getElementById('categoryFilter');
  sel.innerHTML = '<option value="">All Categories</option>';
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

// ── RENDER CARDS ──
function renderCards() {
  const grid = document.getElementById('skillsGrid');
  grid.innerHTML = CATALOG.skills.map(buildCard).join('');
  updateCount();
}

// ── FILTER + SORT ──
function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const risk = document.getElementById('riskFilter').value;
  const cat = document.getElementById('categoryFilter').value;
  const sortBy = document.getElementById('sortBy').value;

  const cards = [...document.querySelectorAll('.skill-card')];

  // Sort first
  const sorted = cards.sort((a,b) => {
    if (sortBy === 'name') return a.dataset.name.localeCompare(b.dataset.name);
    if (sortBy === 'usage') return +b.dataset.usage - +a.dataset.usage;
    if (sortBy === 'bp') return +b.dataset.bp - +a.dataset.bp;
    if (sortBy === 'tokens') return +b.dataset.tokens - +a.dataset.tokens;
    return 0;
  });
  sorted.forEach(c => document.getElementById('skillsGrid').appendChild(c));

  // Filter
  let visible = 0;
  cards.forEach(card => {
    const nameMatch = !search || card.dataset.name.includes(search) ||
      card.querySelector('.capabilities').textContent.toLowerCase().includes(search) ||
      card.querySelector('.card-category').textContent.toLowerCase().includes(search);
    const riskMatch = !risk || card.dataset.risk === risk;
    const catMatch = !cat || card.dataset.cat === cat;
    const show = nameMatch && riskMatch && catMatch;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });

  document.getElementById('noResults').classList.toggle('visible', visible === 0);
  updateCount(visible);
}

function updateCount(n) {
  const total = CATALOG.skills.length;
  const shown = n !== undefined ? n : total;
  document.getElementById('resultsCount').textContent = shown === total ? `${total} skills` : `${shown} of ${total} skills`;
}

// ── THEME ──
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isLight ? 'Dark mode' : 'Light mode';
  localStorage.setItem('catalog-theme', isLight ? 'light' : 'dark');
}
(function() {
  const saved = localStorage.getItem('catalog-theme');
  if (saved === 'light') {
    document.documentElement.classList.add('light');
    // Icon/label set after DOM ready — will be corrected in DOMContentLoaded
  }
})();
document.addEventListener('DOMContentLoaded', function() {
  const isLight = document.documentElement.classList.contains('light');
  document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
  document.getElementById('themeLabel').textContent = isLight ? 'Dark mode' : 'Light mode';
});

function bindControls() {
  if (controlsBound) return;
  document.getElementById('searchBox').addEventListener('input', applyFilters);
  document.getElementById('riskFilter').addEventListener('change', applyFilters);
  document.getElementById('categoryFilter').addEventListener('change', applyFilters);
  document.getElementById('sortBy').addEventListener('change', applyFilters);
  controlsBound = true;
}

function resetFilters() {
  document.getElementById('searchBox').value = '';
  document.getElementById('riskFilter').value = '';
  document.getElementById('categoryFilter').value = '';
  document.getElementById('sortBy').value = 'name';
}

async function handleCatalogFileSelection(file) {
  if (!file) return;

  try {
    const data = await readCatalogFromFile(file);
    cacheCatalog(data);
    initializeCatalog(data, file.name);
  } catch (err) {
    showLoadFailure('The selected file is not valid skill catalog JSON.', {
      allowFilePicker: true,
      detail: err.message
    });
  }
}

function bindCatalogPicker() {
  const openButton = document.getElementById('openCatalogButton');
  const picker = document.getElementById('catalogPicker');
  if (!openButton || !picker || openButton.dataset.bound === 'true') return;

  openButton.addEventListener('click', () => picker.click());
  picker.addEventListener('change', async () => {
    const [file] = picker.files || [];
    await handleCatalogFileSelection(file);
    picker.value = '';
  });
  openButton.dataset.bound = 'true';
}

function cacheCatalog(data) {
  try {
    localStorage.setItem('skill-catalog-cache', JSON.stringify(data));
  } catch (err) {
    console.warn('Unable to cache skill catalog:', err);
  }
}

function getCachedCatalog() {
  try {
    const cached = localStorage.getItem('skill-catalog-cache');
    return cached ? JSON.parse(cached) : null;
  } catch (err) {
    console.warn('Unable to read cached skill catalog:', err);
    return null;
  }
}

function initializeCatalog(data, sourceLabel='local file') {
  CATALOG = data;

  document.getElementById('headerMeta').textContent = `Generated ${new Date(CATALOG.generated_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'})} · v${CATALOG.catalog_version}`;
  document.getElementById('pageFooter').textContent = `Forge Agents Skill Catalog · ${CATALOG.summary.total_skills} skills · Generated ${CATALOG.generated_at} · Loaded from ${sourceLabel}`;
  document.getElementById('catalogSource').textContent = `Source: ${sourceLabel}`;

  resetFilters();
  buildDashboard();
  buildCategoryFilter();
  renderCards();
  bindControls();
  bindCatalogPicker();
}

function readCatalogFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        resolve(JSON.parse(reader.result));
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(reader.error || new Error('Unable to read file'));
    reader.readAsText(file);
  });
}

function showLoadFailure(message, options={}) {
  const cached = getCachedCatalog();
  const grid = document.getElementById('skillsGrid');
  const actions = options.allowFilePicker ?
    `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
      <button id="pickCatalogFile" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:10px 14px;cursor:pointer">Choose skill-catalog.json</button>
      <button id="loadCachedCatalog" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:${cached ? 'pointer' : 'not-allowed'};opacity:${cached ? '1' : '0.5'}" ${cached ? '' : 'disabled'}>Use cached catalog</button>
    </div>
    <input id="catalogFileInput" type="file" accept=".json,application/json" style="display:none">` : '';

  grid.innerHTML =
    `<div style="grid-column:1 / -1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">
      <p style="color:var(--red);font-weight:600">${message}</p>
      ${options.detail ? `<p style="color:var(--text-muted);margin-top:8px">${options.detail}</p>` : ''}
      ${actions}
    </div>`;

  if (!options.allowFilePicker) return;

  const input = document.getElementById('catalogFileInput');
  const pickButton = document.getElementById('pickCatalogFile');
  const cachedButton = document.getElementById('loadCachedCatalog');

  pickButton.addEventListener('click', () => input.click());
  input.addEventListener('change', async () => {
    const [file] = input.files || [];
    await handleCatalogFileSelection(file);
  });

  if (cachedButton && cached) {
    cachedButton.addEventListener('click', () => initializeCatalog(cached, 'cached catalog'));
  }
}

function loadCatalog() {
  fetch('skill-catalog.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      cacheCatalog(data);
      initializeCatalog(data, 'skill-catalog.json');
    })
    .catch(err => {
      if (window.location.protocol === 'file:') {
        const cached = getCachedCatalog();
        if (cached) {
          initializeCatalog(cached, 'cached catalog');
          return;
        }

        showLoadFailure('Failed to load skill-catalog.json from a file:// page.', {
          allowFilePicker: true,
          detail: 'Browsers block automatic reads of neighboring files when this page is opened directly from disk. Choose skill-catalog.json once, or serve the folder over HTTP.'
        });
        console.error('Failed to load skill-catalog.json:', err);
        return;
      }

      showLoadFailure('Failed to load skill-catalog.json.', {
        detail: 'Check that the JSON file exists next to this HTML file and that your local server is serving both files.'
      });
      console.error('Failed to load skill-catalog.json:', err);
    });
}

bindCatalogPicker();
loadCatalog();
</script>
</body>
</html>
